<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News Digest</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #e5eaf2;
      --shadow: 0 10px 28px rgba(16, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.6;
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 28px 18px 42px;
    }

    .header {
      padding: 26px 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: #3461ff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 760;
    }

    .date {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .section {
      margin-top: 22px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, var(--tone-soft), #ffffff);
    }

    .marker {
      width: 9px;
      height: 28px;
      border-radius: 8px;
      background: var(--tone);
      flex: 0 0 auto;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .item {
      padding: 16px 18px 17px;
      border-top: 1px solid var(--line);
    }

    .item:first-of-type {
      border-top: 0;
    }

    h3 {
      margin: 0;
      color: var(--text);
      font-size: 16px;
      line-height: 1.42;
      font-weight: 720;
    }

    .snippet {
      margin: 8px 0 0;
      color: #475467;
      font-size: 14px;
    }

    .group-theme-0 { --tone: #3461ff; --tone-soft: #eef3ff; }
    .group-theme-1 { --tone: #00a88f; --tone-soft: #e9fbf7; }
    .group-theme-2 { --tone: #9b5cff; --tone-soft: #f4efff; }
    .group-theme-3 { --tone: #f97316; --tone-soft: #fff3e8; }
    .group-theme-4 { --tone: #e11d48; --tone-soft: #fff0f3; }
    .group-theme-5 { --tone: #0891b2; --tone-soft: #e9f8fb; }

    @media (max-width: 560px) {
      .page {
        padding: 20px 12px 32px;
      }

      h1 {
        font-size: 24px;
      }

      .section-head,
      .item {
        padding-left: 14px;
        padding-right: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <p class="eyebrow">AI News Digest</p>
      <h1>今日科技新闻摘要</h1>
      <p class="date">{{date}}</p>
    </header>

    <!-- 对每个新闻分组生成一个 section。第 N 个分组使用 class="section group-theme-{N mod 6}"。 -->
    <section class="section group-theme-0">
      <div class="section-head">
        <span class="marker"></span>
        <h2>{{group_name}}</h2>
      </div>
      <article class="item">
        <h3>{{title}}</h3>
        <p class="snippet">{{brief}}</p>
      </article>
    </section>
  </main>
</body>
</html>
